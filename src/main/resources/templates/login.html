<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <style>
        .container { width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .item { margin: 15px 0; }
        label { display: inline-block; width: 80px; }
        input { padding: 6px; width: 250px; }
        .error { color: red; font-size: 12px; margin-top: 5px; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2 align="center">考勤系统 - 登录</h2>
    <div class="error" th:text="${errorMsg}" th:if="${errorMsg != null}"></div>

    <form th:action="@{/userlist/login}" method="post">
        <div class="item">
            <label>用户名：</label>
            <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="item">
            <label>密码：</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="item" align="center">
            <button type="submit">登录</button>
        </div>
        <div align="center">
            <a th:href="@{/userlist/registerPage}">没有账号？去注册</a>
        </div>
    </form>
</div>
</body>
</html>
