<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>选课信息表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">学生选课信息</h2>
<form th:action="@{/student/save}" th:method="post" th:object="${student}" class="card p-4 shadow">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label class="form-label">学生编号</label>
        <input type="text" class="form-control" th:field="*{studentId}" required placeholder="请输入学生编号">
    </div>
    <div class="mb-3">
        <label class="form-label">学生姓名</label>
        <input type="text" class="form-control" th:field="*{studentName}" required placeholder="请输入姓名">
    </div>
    <div class="mb-3">
        <label class="form-label">性别</label>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" th:field="*{gender}" value="男" id="m">
            <label class="form-check-label" for="m">男</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" th:field="*{gender}" value="女" id="f">
            <label class="form-check-label" for="f">女</label>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">课程编号</label>
        <input type="text" class="form-control" th:field="*{courseId}" required placeholder="请输入课程编号">
    </div>

    <button type="submit" class="btn btn-primary">保存</button>
    <a th:href="@{/student/list}" class="btn btn-secondary ms-2">返回列表</a>
</form>
</body>
</html>
