  spring:
    datasource:
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      url: jdbc:sqlserver://localhost:1433;DatabaseName=attendance_system;encrypt=true;trustServerCertificate=true
      username: sa
      password: 123456

  jpa:
    hibernate:
      ddl-auto: update  # 开发环境：自动更新表结构，不删除数据
    show-sql: true      # 控制台打印执行的SQL语句
    properties:
      hibernate:
        format_sql: true # 格式化SQL，方便调试
        dialect: org.hibernate.dialect.SQLServer2012Dialect # SQL Server方言


  server:
    port: 8080